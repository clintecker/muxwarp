version: "2"
linters:
  enable:
    - cyclop
    - funlen
    - gocognit
    - gocritic
    - gocyclo
    - gosec
    - misspell
    - revive
  settings:
    cyclop:
      max-complexity: 5
    funlen:
      lines: 80
      statements: 50
    gocognit:
      min-complexity: 5
    gocyclo:
      min-complexity: 5
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        path: internal/ssh/
        text: G204
      - linters:
          - gosec
        path: internal/scanner/
        text: G204
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
