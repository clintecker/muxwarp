version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: muxwarp
    main: ./cmd/muxwarp
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64, arm]
    goarm: ["7"]
    ignore:
      - goos: darwin
        goarch: arm
    ldflags:
      - "-s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}"
    flags:
      - -trimpath

archives:
  - id: tgz
    builds: [muxwarp]
    format: tar.gz
    files:
      - completions/*
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - name: muxwarp
    repository:
      owner: clintecker
      name: homebrew-tap
    homepage: https://github.com/clintecker/muxwarp
    description: "Warp into tmux sessions on remote machines"
    license: "MIT"
    install: |
      bin.install "muxwarp"
      bash_completion.install "completions/muxwarp.bash" => "muxwarp"
      zsh_completion.install "completions/muxwarp.zsh" => "_muxwarp"
      fish_completion.install "completions/muxwarp.fish" => "muxwarp.fish"

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
